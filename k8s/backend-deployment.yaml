apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore-backend
  namespace: bookstore
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: adhithya143/bookstore-backend:v1
        ports:
        - containerPort: 5555
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: bookstore
spec:
  selector:
    app: backend
  ports:
  - port: 5555
    targetPort: 5555
  type: ClusterIP